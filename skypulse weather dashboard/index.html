<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyPulse Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Header -->
    <header>
        <div class="logo">
            <h1>☁️ SkyPulse</h1>
        </div>

        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="Search city..."
            >
            <button onclick="getWeather()">
                Search
            </button>
        </div>
    </header>

    <!-- Current Weather -->
    <section class="current-weather">

        <div class="main-weather-card">

            <h2 id="cityName">
                Search a City
            </h2>

            <img
                id="weatherIcon"
                src=""
                alt="Weather Icon"
            >

            <h1>
                <span id="temp">--</span>°C
            </h1>

            <p id="condition">
                Weather Condition
            </p>

        </div>

        <!-- Weather Details -->
        <div class="weather-grid">

            <div class="card">
                <h3>💧 Humidity</h3>
                <p id="humidity">--%</p>
            </div>

            <div class="card">
                <h3>🌬 Wind Speed</h3>
                <p id="wind">-- km/h</p>
            </div>

            <div class="card">
                <h3>📈 Pressure</h3>
                <p id="pressure">-- hPa</p>
            </div>

            <div class="card">
                <h3>🌡 Feels Like</h3>
                <p id="feelsLike">-- °C</p>
            </div>

            <div class="card">
                <h3>🌅 Sunrise</h3>
                <p id="sunrise">--:--</p>
            </div>

            <div class="card">
                <h3>🌇 Sunset</h3>
                <p id="sunset">--:--</p>
            </div>

        </div>

    </section>

    <!-- Forecast Section -->
    <section class="forecast-section">

        <h2>📅 7-Day Forecast</h2>

        <div id="forecastContainer">

            <div class="forecast-card">
                <h4>Day</h4>
                <p>--°C</p>
            </div>

            <div class="forecast-card">
                <h4>Day</h4>
                <p>--°C</p>
            </div>

            <div class="forecast-card">
                <h4>Day</h4>
                <p>--°C</p>
            </div>

            <div class="forecast-card">
                <h4>Day</h4>
                <p>--°C</p>
            </div>

            <div class="forecast-card">
                <h4>Day</h4>
                <p>--°C</p>
            </div>

            <div class="forecast-card">
                <h4>Day</h4>
                <p>--°C</p>
            </div>

            <div class="forecast-card">
                <h4>Day</h4>
                <p>--°C</p>
            </div>

        </div>

    </section>

    <!-- Live Weather Radar -->
    <section class="radar-section">

        <h2>🛰 Live Weather Radar</h2>

        <iframe
            src="https://embed.windy.com/embed2.html"
            width="100%"
            height="500"
            frameborder="0">
        </iframe>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
